name: Publish Packages

# Starts after successful workflow Create Git Tags
on:
  workflow_run:
    workflows: ["Create Git Tags"]
    types:
      - completed

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: "10"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure npm auth
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish packages based on tags
        run: |
          set -e

          echo "Fetching tags..."
          git fetch --tags

          TAGS=$(git tag -l "packages/*/v*")
          echo "Found tags:"
          echo "$TAGS"

          for TAG in $TAGS; do
            echo "-----------------------------"
            echo "Processing tag: $TAG"

            PACKAGE=$(echo "$TAG" | cut -d/ -f2)
            VERSION=$(echo "$TAG" | cut -d/ -f3 | sed 's/^v//')

            PACKAGE_DIR="packages/$PACKAGE"

            if [ ! -f "$PACKAGE_DIR/package.json" ]; then
              echo "⏭ Skipping $PACKAGE (package.json not found)"
              continue
            fi

            PACKAGE_NAME=$(node -p "require('./$PACKAGE_DIR/package.json').name")

            echo "Package: $PACKAGE_NAME"
            echo "Version: $VERSION"

            # Check if version exists in npm
            if npm view "$PACKAGE_NAME@$VERSION" version >/dev/null 2>&1; then
              echo "⏭ Already published: $PACKAGE_NAME@$VERSION"
              continue
            fi

            echo "🚀 Publishing $PACKAGE_NAME@$VERSION"
            pnpm publish "$PACKAGE_DIR" --access public
          done

          echo "✅ Publish step completed"